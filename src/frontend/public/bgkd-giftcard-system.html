<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGKD Gift Card System - Blockchain-Powered Maritime Finance</title>
    
    <!-- Preload Critical Assets -->
    <link rel="preload" as="image" href="/assets/generated/maritime-finance-hero.dim_1200x400.png">
    <link rel="preload" as="image" href="/assets/generated/bgkd-token-logo.dim_400x400.png">
    
    <!-- Meta Tags -->
    <meta name="description" content="BGKD Gift Card System - Secure blockchain-powered gift card management for maritime finance operations">
    <meta name="keywords" content="BGKD, gift cards, blockchain, maritime finance, Internet Computer">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/generated/bgkd-token-logo.dim_400x400.png">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #001f3f 0%, #003d7a 50%, #001f3f 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        .hero-banner {
            position: relative;
            height: 200px;
            background: linear-gradient(rgba(0, 31, 63, 0.85), rgba(0, 31, 63, 0.85)), url('/assets/generated/maritime-finance-hero.dim_1200x400.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            border-bottom: 2px solid rgba(218, 165, 32, 0.3);
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(218, 165, 32, 0.1), transparent);
        }
        
        .hero-content {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .logo-container {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .hero-text h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .hero-text p {
            color: #daa520;
            font-size: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .notice {
            background: rgba(218, 165, 32, 0.1);
            border: 1px solid rgba(218, 165, 32, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .notice p {
            color: #daa520;
            font-size: 0.95rem;
        }
        
        @media (max-width: 768px) {
            .hero-banner {
                height: 150px;
            }
            
            .logo-container {
                width: 60px;
                height: 60px;
            }
            
            .hero-text h1 {
                font-size: 1.5rem;
            }
            
            .hero-text p {
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Banner -->
    <div class="hero-banner">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="logo-container">
                <img src="/assets/generated/bgkd-token-logo.dim_400x400.png" alt="BGKD Logo">
            </div>
            <div class="hero-text">
                <h1>BGKD Gift Card System</h1>
                <p>Blockchain-Powered Maritime Finance</p>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="container">
        <div class="notice">
            <p><i class="fas fa-info-circle"></i> This page has been integrated into the main application. Please access the Gift Card System through the navigation menu.</p>
        </div>
    </div>
    
    <script>
        // Redirect to main app after 3 seconds
        setTimeout(() => {
            window.location.href = '/';
        }, 3000);
    </script>
</body>
</html>
