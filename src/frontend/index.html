        <!-- Google Analytics 4 -->
        <!-- Replace G-XXXXXXXXXX with your actual GA4 Measurement ID -->
        <script async src='https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX'></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-XXXXXXXXXX');

          // Enhanced GA4 Event Tracking
          (function() {
            // Track whitepaper and contract link clicks
            document.addEventListener('click', function(e) {
              var target = e.target.closest('a, button');
              if (!target) return;
              
              var href = target.getAttribute('href') || '';
              var text = target.textContent.toLowerCase();
              
              // Track whitepaper downloads
              if (text.includes('whitepaper') || href.includes('whitepaper')) {
                gtag('event', 'investor_document_view', {
                  document_title: 'BGKD Whitepaper',
                  document_type: 'whitepaper',
                  link_url: href || window.location.href
                });
              }
              
              // Track contract link clicks
              if (text.includes('contract') || href.includes('contract')) {
                gtag('event', 'investor_document_view', {
                  document_title: 'BGKD Smart Contract',
                  document_type: 'contract',
                  link_url: href || window.location.href
                });
              }
            });

            // Track form submissions
            document.addEventListener('submit', function(e) {
              var form = e.target;
              var formName = 'unknown';
              var formLocation = window.location.pathname;
              
              // Identify form type by checking form attributes or nearby elements
              if (form.id) {
                formName = form.id;
              } else if (form.querySelector('[name="message"]')) {
                // Check context to determine form type
                var formContext = form.closest('[data-form-type]');
                if (formContext) {
                  formName = formContext.getAttribute('data-form-type');
                } else {
                  // Fallback: check page context
                  if (formLocation.includes('contact')) {
                    formName = 'contact_form';
                  } else if (formLocation.includes('career')) {
                    formName = 'career_form';
                  } else if (formLocation.includes('crypto') || formLocation.includes('token')) {
                    formName = 'investor_form';
                  } else {
                    formName = 'general_form';
                  }
                }
              }
              
              gtag('event', 'form_submit', {
                form_name: formName,
                form_location: formLocation
              });
            });

            // Track 90% scroll depth (fire once per pageview)
            var scrollTracked = false;
            window.addEventListener('scroll', function() {
              if (scrollTracked) return;
              
              var scrollPercentage = (window.scrollY + window.innerHeight) / document.documentElement.scrollHeight * 100;
              
              if (scrollPercentage >= 90) {
                scrollTracked = true;
                gtag('event', 'scroll_depth_90', {
                  page_location: window.location.href,
                  page_title: document.title
                });
              }
            });
          })();
        </script>
